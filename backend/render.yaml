# Render Blueprint for Nejah Backend
# This file configures automatic deployment on Render

services:
  - type: web
    name: nejah-backend
    env: node
    region: oregon # Change to your preferred region
    plan: free # Change to 'starter' or 'standard' for production
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: nejah-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
        sync: false
      - key: JWT_EXPIRATION
        value: 7d
      - key: FRONTEND_URL
        value: https://nejah-online-quran-center.vercel.app
      - key: CORS_ORIGINS
        value: http://localhost:8080,https://nejah-online-quran-center.vercel.app

databases:
  - name: nejah-db
    databaseName: nejah_quran_center
    user: nejah_user
    plan: free # Change to 'starter' for production
