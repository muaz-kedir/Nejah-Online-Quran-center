# Render Blueprint — repo root (monorepo: backend service lives in backend/)
services:
  - type: web
    name: nejah-backend
    runtime: node
    rootDir: backend
    region: oregon
    plan: free
    buildCommand: npm run build:render
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DB_SYNC
        value: "true"
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: nejah-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
        sync: false
      - key: JWT_EXPIRATION
        value: 7d
      - key: FRONTEND_URL
        value: https://nejah-online-quran-center.vercel.app
      - key: CORS_ORIGINS
        value: http://localhost:8080,https://nejah-online-quran-center.vercel.app
      - key: ENCRYPTION_KEY
        generateValue: true
        sync: false

databases:
  - name: nejah-db
    databaseName: nejah_quran_center
    user: nejah_user
    plan: free
